name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        shell: pwsh
        run: |
          $env:RELEASE_TAG = "${{ github.ref_name }}"
          npm run build:release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/release-artifacts/${{ github.ref_name }}/*.exe
            apps/desktop/release-artifacts/${{ github.ref_name }}/SHA256SUMS.txt
            apps/desktop/release-artifacts/${{ github.ref_name }}/manifest.json
