name: Release Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer bump to apply when version_override is empty.
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      version_override:
        description: Optional explicit version, for example 0.3.0.
        required: false
        type: string
      notes:
        description: Optional changelog notes. If empty, commit subjects since the previous tag are used.
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-version:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare version and changelog
        id: prepare
        shell: pwsh
        run: |
          $args = @()
          if ("${{ inputs.version_override }}") {
            $args += "--version"
            $args += "${{ inputs.version_override }}"
          } else {
            $args += "--bump"
            $args += "${{ inputs.bump }}"
          }
          if ("${{ inputs.notes }}") {
            $args += "--notes"
            $args += "${{ inputs.notes }}"
          }
          node scripts/prepare-release-version.mjs @args
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Verify release commit
        run: npm test

      - name: Typecheck release commit
        run: npm run typecheck

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json package-lock.json apps/desktop/package.json apps/server/package.json packages/shared/package.json
          git commit -m "Release v${{ steps.prepare.outputs.version }}"
          git tag "v${{ steps.prepare.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.prepare.outputs.version }}"
