appId: dev.remote-control.client
productName: RemoteControl Client
artifactName: RemoteControl-Client-${version}-windows-${arch}.${ext}
electronUpdaterCompatibility: ">=2.16"
extraMetadata:
  description: RemoteControl viewer app
directories:
  output: release-client
files:
  - out/**/*
  - package.json
asar: true
publish:
  provider: github
  owner: RolandSallaz
  repo: RemoteControllApp
  channel: client
win:
  signAndEditExecutable: true
  icon: build/icon.ico
  target:
    - nsis
nsis:
  artifactName: RemoteControl-Client-${version}-Setup-${arch}.${ext}
  installerIcon: installerIcon.ico
  uninstallerIcon: uninstallerIcon.ico
  installerLanguages:
    - ru_RU
  language: "1049"
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
