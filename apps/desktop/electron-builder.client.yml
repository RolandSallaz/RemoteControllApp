appId: dev.remote-control.client
productName: RemoteControl Client
artifactName: RemoteControl-Client-${version}-windows-${arch}.${ext}
electronUpdaterCompatibility: ">=2.16"
directories:
  output: release-client
files:
  - out/**/*
  - package.json
asar: true
publish:
  provider: github
  owner: RolandSallaz
  repo: RemoteControllApp
  channel: client
win:
  signAndEditExecutable: true
  target:
    - nsis
nsis:
  artifactName: RemoteControl-Client-${version}-Setup-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
